<!DOCTYPE html>

    <script>
        // Check login status on page load
        (function() {
            const token = localStorage.getItem('classify_token');
            if (!token) {
                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
            }
        })();
        function logout() {
            localStorage.removeItem('classify_token');
            window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
        }
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.getElementById('menuToggle');
            menu.classList.toggle('show');
            toggle.textContent = menu.classList.contains('show') ? '✕' : '☰';
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.getElementById('menuToggle');
            if (menu && menu.classList.contains('show') && !menu.contains(e.target) && e.target !== toggle) {
                menu.classList.remove('show');
                toggle.textContent = '☰';
            }
        });
    </script>
    <style>

        .page-header .subtitle { font-size: 13px; color: var(--muted); }
        .page-header-right { display: flex; align-items: center; gap: 12px; }

        }

    <script>
        const API = '';
        const WEEKDAYS = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        let currentSchedules = []; // Store schedules for edit function

        async function apiFetch(path) {
            const r = await fetch(API + path);
            if (!r.ok) throw new Error(r.statusText);
            return r.json();
        }

        function escHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }
        
        function isFull(s) {
            return s.maxParticipants && (s.members || []).length >= s.maxParticipants;
        }

        // Student name list loaded from API
        let ALL_STUDENTS = [];
        async function loadStudentNames() {
            try {
                const res = await fetch('/api/students/names');
                if (res.ok) {
                    const data = await res.json();
                    ALL_STUDENTS = data.names || [];
                }
            } catch (e) {}
        }
// Get current logged-in user name
        function getCurrentUserName() {
            return localStorage.getItem('classify_name') || '';
        }

        // Modal functions
        function openAddModal() {
            document.getElementById('addModal').classList.add('show');
            // Auto-fill organizer with current user name
            document.getElementById('formOrganizer').value = getCurrentUserName();
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('formStartTime').min = now.toISOString().slice(0, 16);
            document.getElementById('formEndTime').min = now.toISOString().slice(0, 16);
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('show');
            document.getElementById('addForm').reset();
            document.getElementById('titleCount').textContent = '0/20';
            document.getElementById('descCount').textContent = '0/200';
            document.getElementById('formError').textContent = '';
        }

        function closeModalOnOverlay(e) {
            if (e.target.id === 'addModal') closeAddModal();
        }

        async function handleAddSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const data = {
                title: document.getElementById('formTitle').value.trim(),
                description: document.getElementById('formDesc').value.trim(),
                startTime: document.getElementById('formStartTime').value,
                endTime: document.getElementById('formEndTime').value || null,
                location: document.getElementById('formLocation').value.trim(),
                organizer: getCurrentUserName()
            };

            if (data.title.length > 20) { document.getElementById('formError').textContent = '活动名称不能超过20字'; return; }
            if (data.description.length > 200) { document.getElementById('formError').textContent = '简介不能超过200字'; return; }
            if (new Date(data.startTime) <= new Date()) { document.getElementById('formError').textContent = '开始时间不能选择过去的'; return; }
            if (!data.organizer) { document.getElementById('formError').textContent = '请选择你的姓名'; return; }

            btn.disabled = true;
            btn.textContent = '提交中...';

            try {
                const res = await fetch('/api/schedules', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || '提交失败');
                }
                closeAddModal();
                loadSchedules();
            } catch (err) {
                document.getElementById('formError').textContent = err.message;
            } finally {
                btn.disabled = false;
                btn.textContent = '发起活动';
            }
        }

        // Toggle join/leave activity
        async function toggleJoin(btn, id, name) {
            if (!name) {
                alert('请先登录');
                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
                return;
            }

            btn.disabled = true;
            btn.textContent = '处理中...';

            try {
                // Check if already joined by checking button state
                if (btn.classList.contains('joined')) {
                    // Leave
                    const res = await fetch('/api/schedules/' + id + '/leave', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.error || '取消失败');
                    }
                } else {
                    // Join
                    const res = await fetch('/api/schedules/' + id + '/join', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.error || '加入失败');
                    }
                }
                loadSchedules();
            } catch (err) {
                alert(err.message);
                loadSchedules();
            }
        }

        async function leaveSchedule(id, name) {
            if (!confirm('确定要取消参与吗?')) return;
            try {
                const res = await fetch('/api/schedules/' + id + '/leave', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || '取消失败');
                }
                loadSchedules();
            } catch (err) {
                alert(err.message);
            }
        }

        async function loadSchedules() {
            const container = document.getElementById('scheduleList');
            const mobileContainer = document.getElementById('mobileScheduleList');
            const rangeEl = document.getElementById('dateRange');

            try {
                const data = await apiFetch('/api/schedules');

                // Update date range display
                if (data.dateRange) {
                    rangeEl.textContent = `${data.dateRange.start} 至 ${data.dateRange.end}(共${data.dateRange.days}天)`;
                }

                const schedules = data.schedules || [];
                currentSchedules = schedules; // Store for edit function

                if (schedules.length === 0) {
                    const emptyHtml = `
                        <div class="empty-state">
                            <div class="icon">📅</div>
                            <h3>暂无日程</h3>
                            <p>未来15天内没有已安排的日程</p>
                        </div>
                    `;
                    container.innerHTML = emptyHtml;
                    mobileContainer.innerHTML = emptyHtml;
                    return;
                }

                // Group schedules by date
                const grouped = {};
                const now = new Date();

                schedules.forEach(s => {
                    const dateKey = s.date;
                    if (!grouped[dateKey]) grouped[dateKey] = [];
                    grouped[dateKey].push(s);
                });

                // Render grouped schedules
                let html = '';
                let mobileHtml = '';
                const sortedDates = Object.keys(grouped).sort();

                sortedDates.forEach(dateKey => {
                    const daySchedules = grouped[dateKey];
                    const today = now.toISOString().split('T')[0];
                    const isToday = dateKey === today;
                    const date = new Date(dateKey);
                    const weekday = WEEKDAYS[date.getDay()];

                    const dayGroupHtml = `
                        <div class="day-group">
                            <div class="day-header ${isToday ? 'today' : ''}">
                                ${dateKey}
                                <span class="weekday">${weekday}${isToday ? ' · 今天' : ''}</span>
                            </div>
                    `;
                    html += dayGroupHtml;
                    mobileHtml += dayGroupHtml;

                    daySchedules.forEach(s => {
                        const isPast = new Date(s.date + 'T23:59:59') < now;
                        const titleHtml = s.articleUrl
                            ? `<a href="${escHtml(s.articleUrl)}" target="_blank" class="schedule-link">${escHtml(s.title)} ↗</a>`
                            : `<span class="schedule-link">${escHtml(s.title)}</span>`;

                        // Encode schedule data for onclick - use base64 to avoid escaping issues
                        const scheduleData = btoa(encodeURIComponent(JSON.stringify(s)));

                        // Format time display
                        let timeHtml = '';
                        if (s.time) {
                            if (s.time.includes('-')) {
                                const [start, end] = s.time.split('-');
                                timeHtml = `<div class="time">${start}</div><div class="end-time">${end}</div>`;
                            } else {
                                timeHtml = `<div class="time">${s.time}</div><div class="end-time" style="visibility:hidden">--:--</div>`;
                            }
                        } else {
                            timeHtml = `<div class="allday">全天</div>`;
                        }


                        const itemHtml = `
                            <div class="schedule-item ${isPast ? 'past' : ''} ${(s.members || []).length > 0 ? 'has-members' : ''}">
                                <div class="timebar">
                                    <div class="schedule-time">${timeHtml}</div>
                                    <button class="join-btn ${(s.members || []).includes(getCurrentUserName()) ? 'joined' : ''} ${!isFull(s) || (s.members || []).includes(getCurrentUserName()) ? '' : 'full'}" onclick="${!isFull(s) || (s.members || []).includes(getCurrentUserName()) ? `toggleJoin(this, '${s.id}', '${getCurrentUserName()}')` : ''}">${(s.members || []).includes(getCurrentUserName()) ? '✓' : (isFull(s) ? '人数已满' : '参加')}</button>
                                </div>
                                <div class="schedule-details">
                                    <div class="schedule-title">${titleHtml}</div>
                                    ${s.description ? `<div class="schedule-desc">${escHtml(s.description)}</div>` : ''}
                                    ${s.location ? `<div class="schedule-location">📍 ${escHtml(s.location)}</div>` : ''}
                                    ${(s.members || []).length > 0 ? `
                                        <div class="schedule-participants">
                                            <div class="label">👥 参与成员 (${(s.members || []).length})</div>
                                            <div class="member-tags">${(s.members || []).map((m, i) => `<span class="member-tag ${i === 0 && s.organizer === m ? 'organizer' : ''}">${escHtml(m)}${i === 0 && s.organizer === m ? ' (发起人)' : ''}${s.organizer !== m ? `` : ''}</span>`).join('')}</div>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        `;

                        // 移动端使用time-row结构
                        const mobileItemHtml = `
                            <div class="schedule-item ${isPast ? 'past' : ''} ${(s.members || []).length > 0 ? 'has-members' : ''}">
                                <div class="time-row">
                                    <div class="schedule-time">${timeHtml}</div>
                                    <button class="join-btn ${(s.members || []).includes(getCurrentUserName()) ? 'joined' : ''} ${!isFull(s) || (s.members || []).includes(getCurrentUserName()) ? '' : 'full'}" onclick="${!isFull(s) || (s.members || []).includes(getCurrentUserName()) ? `toggleJoin(this, '${s.id}', '${getCurrentUserName()}')` : ''}">${(s.members || []).includes(getCurrentUserName()) ? '✓' : (isFull(s) ? '人数已满' : '参加')}</button>
                                    <button class="subscribe-btn" onclick="downloadICSFromData(this)" data-schedule="${scheduleData}">添加到日历</button>
                                </div>
                                <div class="schedule-details">
                                    <div class="schedule-title">${titleHtml}</div>
                                    ${s.description ? `<div class="schedule-desc">${escHtml(s.description)}</div>` : ''}
                                    ${s.location ? `<div class="schedule-location">📍 ${escHtml(s.location)}</div>` : ''}
                                    ${(s.members || []).length > 0 ? `
                                        <div class="schedule-participants">
                                            <div class="label">👥 参与成员 (${(s.members || []).length})</div>
                                            <div class="member-tags">${(s.members || []).map((m, i) => `<span class="member-tag ${i === 0 && s.organizer === m ? 'organizer' : ''}">${escHtml(m)}${i === 0 && s.organizer === m ? ' (发起人)' : ''}${s.organizer !== m ? `` : ''}</span>`).join('')}</div>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                        html += itemHtml;
                        mobileHtml += mobileItemHtml;
                    });

                    html += '</div>';
                    mobileHtml += '</div>';
                });

                container.innerHTML = html;
                mobileContainer.innerHTML = mobileHtml;

            } catch (e) {
                const errorHtml = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <h3>加载失败</h3>
                        <p>${e.message}</p>
                    </div>
                `;
                container.innerHTML = errorHtml;
                mobileContainer.innerHTML = errorHtml;
            }
        }

        async function loadLongTermActivities() {
            const container = document.getElementById('longTermList');
            const mobileContainer = document.getElementById('mobileLongTermList');

            try {
                const data = await apiFetch('/api/longterm');
                const activities = data.activities || [];

                if (activities.length === 0) {
                    const emptyHtml = '<div class="long-term-item"><div class="long-term-desc" style="color: var(--muted);">暂无长期活动</div></div>';
                    container.innerHTML = emptyHtml;
                    mobileContainer.innerHTML = emptyHtml;
                    return;
                }

                const now = new Date();
                const fifteenDaysLater = new Date(now);
                fifteenDaysLater.setDate(fifteenDaysLater.getDate() + 15);

                // Separate activities with and without fuzzy dates
                const preciseActivities = activities.filter(a => !a.displayStart && !a.displayEnd);
                const fuzzyActivities = activities.filter(a => a.displayStart || a.displayEnd);

                // Filter: only show activities starting within 15 days
                const filterWithin15Days = (list) => {
                    return list.filter(a => {
                        if (a.sortDate) return a.sortDate <= fifteenDaysLater.getTime();
                        if (a.startDate) return new Date(a.startDate) <= fifteenDaysLater;
                        if (a.endDate) return new Date(a.endDate) <= fifteenDaysLater;
                        return true;
                    });
                };

                const visiblePrecise = filterWithin15Days(preciseActivities);
                const visibleFuzzy = filterWithin15Days(fuzzyActivities);

                // Sort precise activities by start date
                visiblePrecise.sort((a, b) => {
                    const dateA = a.sortDate || (a.startDate ? new Date(a.startDate).getTime() : Infinity);
                    const dateB = b.sortDate || (b.startDate ? new Date(b.startDate).getTime() : Infinity);
                    return dateA - dateB;
                });

                // Sort fuzzy activities by sortDate
                visibleFuzzy.sort((a, b) => {
                    const dateA = a.sortDate || (a.startDate ? new Date(a.startDate).getTime() : Infinity);
                    const dateB = b.sortDate || (b.startDate ? new Date(b.startDate).getTime() : Infinity);
                    return dateA - dateB;
                });

                // Combine: precise first, then fuzzy
                const sortedActivities = [...visiblePrecise, ...visibleFuzzy];

                if (sortedActivities.length === 0) {
                    const emptyHtml = '<div class="long-term-item"><div class="long-term-desc" style="color: var(--muted);">暂无近期长期活动</div></div>';
                    container.innerHTML = emptyHtml;
                    mobileContainer.innerHTML = emptyHtml;
                    return;
                }

                let html = '';
                sortedActivities.forEach(a => {
                    const titleHtml = a.url
                        ? `<a href="${escHtml(a.url)}" target="_blank">${escHtml(a.title)}</a>`
                        : escHtml(a.title);

                    let datesHtml = '';
                    const isExpired = a.endDate && new Date(a.endDate) < now;
                    const displayStart = a.displayStart || a.startDate;
                    const displayEnd = a.displayEnd || a.endDate;

                    if (displayStart || displayEnd) {
                        const dateClass = isExpired ? 'expired' : '';
                        if (displayStart && displayEnd) {
                            datesHtml = `<div class="long-term-dates ${dateClass}">📅 ${displayStart} 至 ${displayEnd}</div>`;
                        } else if (displayStart) {
                            datesHtml = `<div class="long-term-dates">📅 ${displayStart}</div>`;
                        } else if (displayEnd) {
                            datesHtml = `<div class="long-term-dates ${dateClass}">📅 截止 ${displayEnd}</div>`;
                        }
                    }

                    html += `
                        <div class="long-term-item">
                            <div class="long-term-title">${titleHtml}</div>
                            ${a.description ? `<div class="long-term-desc">${escHtml(a.description)}</div>` : ''}
                            ${datesHtml}
                        </div>
                    `;
                });
                container.innerHTML = html;
                mobileContainer.innerHTML = html;
            } catch (e) {
                const errorHtml = '<div class="long-term-item"><div class="long-term-desc" style="color: #ff3b30;">加载失败</div></div>';
                container.innerHTML = errorHtml;
                mobileContainer.innerHTML = errorHtml;
            }
        }

        // Mobile tab switching
        function switchTab(tab) {
            // Update tab buttons
            document.getElementById('tabSchedules').classList.toggle('active', tab === 'schedules');
            document.getElementById('tabLongterm').classList.toggle('active', tab === 'longterm');

            // Update content
            document.getElementById('mobileSchedules').classList.toggle('active', tab === 'schedules');
            document.getElementById('mobileLongterm').classList.toggle('active', tab === 'longterm');
        }

        // Generate ICS file content for a schedule
        function generateICS(schedule) {
            const formatDate = (dateStr, timeStr) => {
                const [year, month, day] = dateStr.split('-');
                let hours = '00', minutes = '00', endHours = '23', endMinutes = '59';

                if (timeStr) {
                    if (timeStr.includes('-')) {
                        const [start, end] = timeStr.split('-');
                        [hours, minutes] = start.split(':');
                        [endHours, endMinutes] = end.split(':');
                    } else {
                        [hours, minutes] = timeStr.split(':');
                        // Default 1 hour duration
                        endHours = String(parseInt(hours) + 1).padStart(2, '0');
                    }
                }

                const format = (y, m, d, h, min) =>
                    `${y}${m}${d}T${h}${min}00`;

                return {
                    start: format(year, month, day, hours, minutes),
                    end: format(year, month, day, endHours, endMinutes)
                };
            };

            const { start, end } = formatDate(schedule.date, schedule.time);
            const uid = schedule.id + '@' + (window.__SITE_CONFIG__?.site?.domain || 'localhost:3000');
            const now = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
            const summary = schedule.title.replace(/[<>]/g, '');
            const description = (schedule.description || '').replace(/[<>]/g, '').replace(/\n/g, '\\n');
            const location = (schedule.location || '').replace(/[<>]/g, '').replace(/\n/g, '\\n');

            return JSON.stringify({
                start,
                end,
                summary,
                description,
                location,
                uid,
                dtstamp: now
            });
        }

        // Download ICS file from encoded data attribute
        function downloadICSFromData(button) {
            try {
                const encodedData = button.getAttribute('data-schedule');
                const schedule = JSON.parse(decodeURIComponent(atob(encodedData)));

                const formatDate = (dateStr, timeStr) => {
                    const [year, month, day] = dateStr.split('-');
                    let hours = '00', minutes = '00', endHours = '23', endMinutes = '59';

                    if (timeStr) {
                        if (timeStr.includes('-')) {
                            const [start, end] = timeStr.split('-');
                            [hours, minutes] = start.split(':');
                            [endHours, endMinutes] = end.split(':');
                        } else {
                            [hours, minutes] = timeStr.split(':');
                            endHours = String(parseInt(hours) + 1).padStart(2, '0');
                        }
                    }

                    const format = (y, m, d, h, min) => `${y}${m}${d}T${h}${min}00`;
                    return {
                        start: format(year, month, day, hours, minutes),
                        end: format(year, month, day, endHours, endMinutes)
                    };
                };

                const { start, end } = formatDate(schedule.date, schedule.time);
                const uid = schedule.id + '@' + (window.__SITE_CONFIG__?.site?.domain || 'localhost:3000');
                const now = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
                const summary = (schedule.title || '').replace(/[<>\n]/g, '');
                const description = (schedule.description || '').replace(/[<>\n]/g, '');
                const location = (schedule.location || '').replace(/[<>\n]/g, '');

                const icsContent = [
                    'BEGIN:VCALENDAR',
                    'VERSION:2.0',
                    'PRODID:-//Classify//班级日程//CN',
                    'CALSCALE:GREGORIAN',
                    'METHOD:PUBLISH',
                    'BEGIN:VEVENT',
                    `DTSTART:${start}`,
                    `DTEND:${end}`,
                    `DTSTAMP:${now}`,
                    `UID:${uid}`,
                    `SUMMARY:${summary}`,
                    description ? `DESCRIPTION:${description}` : '',
                    location ? `LOCATION:${location}` : '',
                    'END:VEVENT',
                    'END:VCALENDAR'
                ].filter(line => line !== '').join('\r\n');

                const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `classify_${schedule.date}.ics`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            } catch (e) {
                console.error('Failed to download ICS:', e);
                alert('添加日历失败,请稍后重试');
            }
        }

        // Generate ICS file content for a schedule (legacy function, kept for compatibility)
        function generateICS(schedule) {
            return JSON.stringify(schedule);
        }

        // Load schedules on page load
        loadStudentNames();
        loadSchedules();
        loadLongTermActivities();

        // Form character counters
        document.getElementById('formTitle').addEventListener('input', (e) => {
            const len = e.target.value.length;
            const cnt = document.getElementById('titleCount');
            cnt.textContent = len + '/20';
            cnt.classList.toggle('warning', len >= 18);
        });
        document.getElementById('formDesc').addEventListener('input', (e) => {
            const len = e.target.value.length;
            const cnt = document.getElementById('descCount');
            cnt.textContent = len + '/200';
            cnt.classList.toggle('warning', len >= 180);
        });

        // Toggle subscription tooltip
        function toggleSubscribeTooltip() {
            const tooltip = document.getElementById('subscribeTooltip');
            tooltip.classList.toggle('show');
            if (tooltip.classList.contains('show')) {
                document.addEventListener('click', closeTooltipOnOutside);
            }
        }

        function closeTooltipOnOutside(e) {
            const tooltip = document.getElementById('subscribeTooltip');
            const btn = document.querySelector('.header-subscribe-btn');
            if (!tooltip.contains(e.target) && !btn.contains(e.target)) {
                tooltip.classList.remove('show');
                document.removeEventListener('click', closeTooltipOnOutside);
            }
        }

        // Copy link and trigger subscription
        function copyAndSubscribe() {
            const url = 'https://' + (window.__SITE_CONFIG__?.site?.domain || 'localhost:3000') + '/api/subscribe.ics';
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => {
                    const btn = document.querySelector('.copy-btn-small');
                    btn.textContent = '已复制! 正在打开日历...';
                    btn.style.background = '#4CAF50';
                });
            }

            if (isMobile) {
                setTimeout(() => {
                    window.location.href = 'webcal://' + (window.__SITE_CONFIG__?.site?.domain || 'localhost:3000') + '/api/subscribe.ics';
                }, 300);
            } else {
                setTimeout(() => {
                    window.location.href = url;
                }, 300);
            }

            setTimeout(() => {
                document.getElementById('subscribeTooltip').classList.remove('show');
            }, 2000);
        }

        // Legacy function for backward compatibility
        function subscribeCalendar() {
            toggleSubscribeTooltip();
        }

        // Legacy function for backward compatibility
        function copySubscribeUrl() {
            if (navigator.clipboard) {
                navigator.clipboard.writeText('https://' + (window.__SITE_CONFIG__?.site?.domain || 'localhost:3000') + '/api/subscribe.ics');
            }
        }

    </script>
<script src="/auth-check.js"></script>
<script src="/config.js"></script>
<script src="/config-init.js"></script>
</body>
