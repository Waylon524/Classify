<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传文件 - 知识库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/common.css">
    <style>
        body {
            display: flex; align-items: center; justify-content: center;
            padding: 20px; color: var(--ink);
        }
        .container {
            background: var(--surface-card); border: 1px solid rgba(0, 229, 160, 0.08);
            border-radius: 24px; padding: 40px; width: 100%; max-width: 500px;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            position: relative; z-index: 2;
        }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 24px; color: var(--ink); text-align: center; }
        .drop-zone {
            border: 2px dashed rgba(0, 229, 160, 0.2); border-radius: 16px;
            padding: 40px; text-align: center; cursor: pointer;
            transition: all 0.3s; margin-bottom: 20px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--primary); background: rgba(0, 229, 160, 0.04);
        }
        .drop-zone input { display: none; }
        .drop-zone-icon { font-size: 48px; margin-bottom: 16px; }
        .drop-zone-text { color: var(--muted); font-size: 15px; }
        .drop-zone-text strong { color: var(--primary); }
        .folder-select {
            width: 100%; padding: 12px 16px;
            border: 1px solid rgba(0, 229, 160, 0.12); border-radius: 10px;
            font-size: 15px; margin-bottom: 16px;
            background: rgba(8, 16, 36, 0.6); color: var(--ink);
            font-family: var(--font-body);
        }
        .folder-select option { background: #0a1020; color: var(--ink); }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--accent-teal));
            color: var(--canvas); border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; font-family: var(--font-body);
        }
        .btn:hover { box-shadow: 0 8px 24px rgba(0, 229, 160, 0.25); transform: translateY(-1px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .msg {
            margin-top: 16px; padding: 12px; border-radius: 10px;
            text-align: center; font-size: 14px; display: none;
        }
        .msg.success { background: rgba(0, 229, 160, 0.1); color: var(--primary); display: block; border: 1px solid rgba(0, 229, 160, 0.15); }
        .msg.error { background: rgba(255, 80, 80, 0.08); color: #ff6b6b; display: block; border: 1px solid rgba(255, 80, 80, 0.15); }
        .file-list { margin-top: 16px; }
        .file-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; background: rgba(8, 16, 36, 0.6);
            border: 1px solid rgba(0, 229, 160, 0.06);
            border-radius: 8px; margin-bottom: 8px; font-size: 14px;
        }
        .file-name { color: var(--ink); word-break: break-all; }
        .file-size { color: var(--muted); margin-left: 12px; flex-shrink: 0; }
        .tip {
            margin-top: 20px; padding: 12px;
            background: rgba(240, 192, 64, 0.06); border: 1px solid rgba(240, 192, 64, 0.1);
            border-radius: 10px; font-size: 13px; color: var(--muted);
        }
        .tip a { color: var(--primary); text-decoration: none; }
        .tip a:hover { text-decoration: underline; }
    </style>
    <link rel="stylesheet" href="/theme-light.css">
    <script src="/theme.js"></script>
</head>
<body>
    <div class="container">
        <h1>📤 上传文件到 知识库</h1>
        
        <select class="folder-select" id="folderSelect">
            <option value="">根目录</option>
        </select>
        
        <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" multiple>
            <div class="drop-zone-icon">📁</div>
            <div class="drop-zone-text">拖放文件到这里<br>或<strong>点击选择文件</strong></div>
        </div>
        
        <div class="file-list" id="fileList"></div>
        
        <button class="btn" id="uploadBtn" disabled>上传</button>
        
        <div class="msg" id="msg"></div>
        
        <div class="tip">💡 上传后约1分钟自动同步到网站，或点击 <a href="/files.html">知识库</a> 查看</div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const folderSelect = document.getElementById('folderSelect');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileList = document.getElementById('fileList');
        const msg = document.getElementById('msg');
        
        let filesToUpload = [];
        
        async function loadFolders() {
            try {
                const res = await fetch('/api/folders');
                const folders = await res.json();
                folders.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f.id;
                    opt.textContent = f.name;
                    folderSelect.appendChild(opt);
                });
            } catch (e) {
                console.error(e);
            }
        }
        loadFolders();
        
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFiles);
        
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles({ target: { files: e.dataTransfer.files } }); });
        
        function handleFiles(e) {
            filesToUpload = Array.from(e.target.files || []);
            fileList.innerHTML = filesToUpload.map(f => `
                <div class="file-item">
                    <span class="file-name">${f.name}</span>
                    <span class="file-size">${(f.size/1024).toFixed(1)}KB</span>
                </div>
            `).join('');
            uploadBtn.disabled = filesToUpload.length === 0;
        }
        
        uploadBtn.addEventListener('click', async () => {
            if (filesToUpload.length === 0) return;
            uploadBtn.disabled = true;
            uploadBtn.textContent = '上传中...';
            msg.className = 'msg';
            
            const folderId = folderSelect.value;
            let success = 0, failed = 0;
            
            for (const file of filesToUpload) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('folderId', folderId);
                
                try {
                    const res = await fetch('/api/files/upload', { method: 'POST', body: formData });
                    if (res.ok) success++;
                    else failed++;
                } catch (e) { failed++; }
            }
            
            if (failed === 0) {
                msg.className = 'msg success';
                msg.textContent = `✅ 上传成功！${success} 个文件已上传，约1分钟后同步到网站`;
                filesToUpload = [];
                fileList.innerHTML = '';
                fileInput.value = '';
            } else {
                msg.className = 'msg error';
                msg.textContent = `⚠️ 部分上传失败：成功${success}个，失败${failed}个`;
            }
            
            uploadBtn.disabled = false;
            uploadBtn.textContent = '上传';
        });
    </script>
<script src="/auth-check.js"></script>
<script src="/config.js"></script>
<script src="/config-init.js"></script>
</body>
</html>
