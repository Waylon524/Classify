<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            const token = localStorage.getItem('classify_token');
            if (!token) {
                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
            }
        })();
        function logout() {
            localStorage.removeItem('classify_token');
            window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
        }
    </script>
    <link rel="stylesheet" href="/common.css">
    <style>
        .hero-section {
            min-height: calc(100vh - var(--nav-height));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-section) var(--space-lg) 60px;
            text-align: center;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            background: var(--surface-card);
            border: 1px solid var(--hairline);
            border-radius: var(--radius-pill);
            padding: 4px 16px;
            font-size: 12px;
            font-weight: 500;
            font-family: var(--font-body);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: var(--space-lg);
            opacity: 0;
            animation: fadeSlideUp 0.8s 0.2s forwards;
        }
        .hero-badge .pulse-dot {
            width: 6px; height: 6px;
            background: var(--primary);
            border-radius: 50%;
        }
        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(48px, 8vw, 64px);
            font-weight: 400;
            color: var(--ink);
            margin-bottom: var(--space-sm);
            opacity: 0;
            animation: fadeSlideUp 1s 0.4s forwards;
            letter-spacing: -1.5px;
            line-height: 1.05;
        }
        .hero-subtitle {
            font-size: clamp(16px, 2.5vw, 20px);
            color: var(--muted);
            margin-bottom: var(--space-xxl);
            opacity: 0;
            animation: fadeSlideUp 1s 0.6s forwards;
            font-weight: 400;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: var(--space-md);
            max-width: 1200px;
            width: 100%;
            padding: 0 var(--space-lg);
            margin: 0 auto;
        }
        .menu-card {
            background: var(--surface-card);
            border: 1px solid var(--hairline);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
            min-height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: cardReveal 0.8s forwards;
        }
        .menu-card:nth-child(1) { animation-delay: 0.8s; }
        .menu-card:nth-child(2) { animation-delay: 1.0s; }
        .menu-card:nth-child(3) { animation-delay: 1.2s; }
        .menu-card:nth-child(4) { animation-delay: 1.4s; }
        .menu-card:nth-child(5) { animation-delay: 1.6s; }
        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .menu-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }
        .menu-card .icon {
            font-size: 44px;
            margin-bottom: var(--space-md);
            transition: transform 0.2s;
        }
        .menu-card:hover .icon { transform: scale(1.05); }
        .menu-card .title {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 400;
            margin-bottom: var(--space-xs);
            color: var(--ink);
            letter-spacing: -0.3px;
        }
        .menu-card .desc {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.5;
        }
        .menu-card .count {
            margin-top: var(--space-sm);
            font-size: 12px;
            font-weight: 500;
            color: var(--muted-soft);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        @media (max-width: 768px) {
            .menu-grid { grid-template-columns: repeat(2, 1fr); gap: var(--space-sm); }
            .menu-card { min-height: 180px; padding: var(--space-lg) var(--space-md); }
            .menu-card .icon { font-size: 36px; margin-bottom: var(--space-sm); }
            .hero-section { padding: 60px var(--space-md) 40px; }
            .hero-subtitle { margin-bottom: var(--space-xl); }
        }
    </style>
    <link rel="stylesheet" href="/theme-light.css">
    <script src="/theme.js"></script>
</head>
<body>
    <nav>
        <div class="logo"><a href="/">🏫</a><a href="/">Classify</a></div>
        <div class="nav-links">
            <a href="/" class="active">首页</a>
            <a href="/schedule.html">日程</a>
            <a href="/files.html">文件</a>
            <a href="/navi.html">导航</a>
            <a href="/notices.html">通知</a>
            <a href="/form.html">表单</a>
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="切换主题">🌙</button>
            <button onclick="logout()" class="logout-btn-nav">退出登录</button>
        </div>
        <button class="menu-toggle" id="menuToggle" onclick="toggleMobileMenu()">☰</button>
    </nav>
    <div class="mobile-menu" id="mobileMenu">
        <a href="/">首页</a>
        <a href="/schedule.html">日程</a>
        <a href="/files.html">文件</a>
        <a href="/navi.html">导航</a>
        <a href="/notices.html">通知</a>
        <a href="/form.html">表单</a>
        <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>

    <main>
        <section class="hero-section">
            <div class="hero-badge"><span class="pulse-dot"></span> 一站式班级服务平台</div>
            <h1 class="hero-title">Classify</h1>
            <p class="hero-subtitle">日程 · 文件 · 导航 · 通知 · 表单</p>
            <div class="menu-grid">
                <div class="menu-card" onclick="window.location.href='/schedule.html'">
                    <div class="icon">📅</div>
                    <div class="title">日程</div>
                    <div class="desc">复旦活动日程 · 公众号精选</div>
                    <div class="count" id="scheduleCount">查看日程</div>
                </div>
                <div class="menu-card" onclick="window.location.href='/files.html'">
                    <div class="icon">📚</div>
                    <div class="title">文件</div>
                    <div class="desc">复旦知识库 · 课程教材</div>
                    <div class="count" id="fileCount">加载中...</div>
                </div>
                <div class="menu-card" onclick="window.location.href='/navi.html'">
                    <div class="icon">💻</div>
                    <div class="title">导航</div>
                    <div class="desc">搜索工具 · 在线应用</div>
                    <div class="count">浏览器主页</div>
                </div>
                <div class="menu-card" onclick="window.location.href='/notices.html'">
                    <div class="icon">📢</div>
                    <div class="title">通知</div>
                    <div class="desc">教务通知 · 平台公告</div>
                    <div class="count" id="noticeCount">查看通知</div>
                </div>
                <div class="menu-card" onclick="window.location.href='/form.html'">
                    <div class="icon">📋</div>
                    <div class="title">表单</div>
                    <div class="desc">投票评选 · 表单收集</div>
                    <div class="count" id="formCount">查看表单</div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <a href="https://beian.miit.gov.cn/#/Integrated/index" target="_blank" rel="nofollow">苏ICP备2026022402号-1</a>
    </footer>

    <script>
        const API = '';

        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.getElementById('menuToggle');
            menu.classList.toggle('show');
            toggle.textContent = menu.classList.contains('show') ? '✕' : '☰';
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.getElementById('menuToggle');
            if (menu && menu.classList.contains('show') && !menu.contains(e.target) && e.target !== toggle) {
                menu.classList.remove('show');
                toggle.textContent = '☰';
            }
        });

        async function apiFetch(path) {
            const r = await fetch(API + path);
            if (!r.ok) throw new Error(r.statusText);
            return r.json();
        }

        async function updateFileCount() {
            try {
                const f = await apiFetch('/api/files');
                document.getElementById('fileCount').textContent = f.length + ' 个文件';
            } catch {
                document.getElementById('fileCount').textContent = '加载失败';
            }
        }

        async function updateFormCount() {
            try {
                const v = await apiFetch('/api/votes');
                document.getElementById('formCount').textContent = v.length + ' 个表单';
            } catch {
                document.getElementById('formCount').textContent = '查看表单';
            }
        }

        updateFileCount();
        updateFormCount();
    </script>
<script src="/auth-check.js"></script>
<script src="/config.js"></script>
<script src="/config-init.js"></script>
</body>
</html>
