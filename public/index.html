<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecolony · e生菌落</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            const token = localStorage.getItem('ecolony_token');
            if (!token) {
                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
            }
        })();
        function logout() {
            localStorage.removeItem('ecolony_token');
            window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
        }
    </script>
    <link rel="stylesheet" href="/common.css">
    <style>
        /* Index page-specific orb overrides */
        .bg-orb { opacity: 0.3; }
        .bg-orb-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,229,160,0.25), transparent 70%);
        }
        .bg-orb-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,184,212,0.2), transparent 70%);
            bottom: -15%;
        }

        .hero-section {
            min-height: calc(100vh - 56px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px 60px;
            text-align: center;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 229, 160, 0.08);
            border: 1px solid rgba(0, 229, 160, 0.15);
            border-radius: 24px;
            padding: 6px 18px;
            font-size: 12px;
            color: var(--glow-primary);
            margin-bottom: 28px;
            opacity: 0;
            animation: fadeSlideUp 0.8s 0.2s forwards;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .hero-badge .pulse-dot {
            width: 6px; height: 6px;
            background: var(--glow-primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 229, 160, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0, 229, 160, 0); }
        }
        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(48px, 8vw, 88px);
            font-weight: 700;
            margin-bottom: 12px;
            opacity: 0;
            animation: fadeSlideUp 1s 0.4s forwards;
            letter-spacing: -1px;
            line-height: 1.05;
        }
        .hero-title .glow-text {
            background: linear-gradient(135deg, var(--glow-primary), var(--glow-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(0, 229, 160, 0.3));
        }
        .hero-subtitle {
            font-size: clamp(16px, 2.5vw, 20px);
            color: var(--text-secondary);
            margin-bottom: 64px;
            opacity: 0;
            animation: fadeSlideUp 1s 0.6s forwards;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 1300px;
            width: 100%;
            padding: 0 24px;
            margin: 0 auto;
        }
        .menu-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 44px 28px 36px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 0;
            animation: cardReveal 0.8s forwards;
        }
        .menu-card:nth-child(1) { animation-delay: 0.8s; }
        .menu-card:nth-child(2) { animation-delay: 1.0s; }
        .menu-card:nth-child(3) { animation-delay: 1.2s; }
        .menu-card:nth-child(4) { animation-delay: 1.4s; }
        .menu-card:nth-child(5) { animation-delay: 1.6s; }
        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .menu-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glow-primary), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .menu-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(0, 229, 160, 0.06), transparent 50%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
        .menu-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-glow-hover);
            transform: translateY(-4px);
            box-shadow: 0 20px 60px -12px rgba(0, 229, 160, 0.15),
                        0 0 0 1px rgba(0, 229, 160, 0.1);
        }
        .menu-card:hover::before { opacity: 1; }
        .menu-card:hover::after { opacity: 1; }
        .menu-card .icon {
            font-size: 52px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 12px rgba(0, 229, 160, 0.3));
            transition: transform 0.4s, filter 0.4s;
        }
        .menu-card:hover .icon {
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px rgba(0, 229, 160, 0.5));
        }
        .menu-card .title {
            font-family: var(--font-body);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }
        .menu-card .desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .menu-card .count {
            margin-top: 16px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }
            .menu-card {
                min-height: 200px;
                padding: 32px 20px 28px;
            }
            .menu-card .icon { font-size: 40px; margin-bottom: 14px; }
            .menu-card .title { font-size: 17px; }
            .hero-section { padding: 60px 20px 40px; }
            .hero-subtitle { margin-bottom: 40px; }
        }
        @media (max-width: 400px) {
            .menu-grid { gap: 10px; }
            .menu-card { min-height: 170px; padding: 24px 16px 20px; }
        }
    </style>
    <link rel="stylesheet" href="/theme-light.css">
    <script src="/theme.js"></script>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="noise-overlay"></div>

    <nav>
        <div class="logo"><span class="logo-icon">🧬</span><span>Ecolony</span></div>
        <div class="nav-links">
            <a href="/" class="active">首页</a>
            <a href="/schedule.html">e 日程</a>
            <a href="/files.html">e 文件</a>
            <a href="/navi.html">e 导航</a>
            <a href="/notices.html">e 通知</a>
            <a href="/form.html">e 表单</a>
            <button onclick="logout()" class="logout-btn-nav">退出登录</button>
        </div>
        <button class="menu-toggle" id="menuToggle" onclick="toggleMobileMenu()">☰</button>
    </nav>
    <div class="mobile-menu" id="mobileMenu">
        <a href="/">首页</a>
        <a href="/schedule.html">e 日程</a>
        <a href="/files.html">e 文件</a>
        <a href="/navi.html">e 导航</a>
        <a href="/notices.html">e 通知</a>
        <a href="/form.html">e 表单</a>
        <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>

    <main>
        <section class="hero-section">
            <div class="hero-badge"><span class="pulse-dot"></span> 复旦 · e生菌落</div>
            <h1 class="hero-title"><span class="glow-text">Ecolony</span></h1>
            <p class="hero-subtitle">e 生菌落 · e 生菌们共同的家园</p>
            <div class="menu-grid">
                <div class="menu-card" onclick="window.location.href='/schedule.html'">
                    <div class="icon">📅</div>
                    <div class="title">e 日程</div>
                    <div class="desc">复旦活动日程 · 公众号精选</div>
                    <div class="count" id="scheduleCount">查看日程</div>
                </div>
                <div class="menu-card" onclick="window.location.href='/files.html'">
                    <div class="icon">📚</div>
                    <div class="title">e 文件</div>
                    <div class="desc">复旦知识库 · 课程教材</div>
                    <div class="count" id="fileCount">加载中...</div>
                </div>
                <div class="menu-card" onclick="window.location.href='/navi.html'">
                    <div class="icon">💻</div>
                    <div class="title">e 导航</div>
                    <div class="desc">搜索工具 · 在线应用</div>
                    <div class="count">浏览器主页</div>
                </div>
                <div class="menu-card" onclick="window.location.href='/notices.html'">
                    <div class="icon">📢</div>
                    <div class="title">e 通知</div>
                    <div class="desc">教务通知 · 平台公告</div>
                    <div class="count" id="noticeCount">查看通知</div>
                </div>
                <div class="menu-card" onclick="window.location.href='/form.html'">
                    <div class="icon">📋</div>
                    <div class="title">e 表单</div>
                    <div class="desc">投票评选 · 表单收集</div>
                    <div class="count" id="formCount">查看表单</div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <a href="https://beian.miit.gov.cn/#/Integrated/index" target="_blank" rel="nofollow">苏ICP备2026022402号-1</a>
    </footer>

    <script>
        const API = '';

        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.getElementById('menuToggle');
            menu.classList.toggle('show');
            toggle.textContent = menu.classList.contains('show') ? '✕' : '☰';
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.getElementById('menuToggle');
            if (menu && menu.classList.contains('show') && !menu.contains(e.target) && e.target !== toggle) {
                menu.classList.remove('show');
                toggle.textContent = '☰';
            }
        });

        async function apiFetch(path) {
            const r = await fetch(API + path);
            if (!r.ok) throw new Error(r.statusText);
            return r.json();
        }

        async function updateFileCount() {
            try {
                const f = await apiFetch('/api/files');
                document.getElementById('fileCount').textContent = f.length + ' 个文件';
            } catch {
                document.getElementById('fileCount').textContent = '加载失败';
            }
        }

        async function updateFormCount() {
            try {
                const v = await apiFetch('/api/votes');
                document.getElementById('formCount').textContent = v.length + ' 个表单';
            } catch {
                document.getElementById('formCount').textContent = '查看表单';
            }
        }

        updateFileCount();
        updateFormCount();
    </script>
<script src="/auth-check.js"></script>
<script src="/config.js"></script>
<script src="/config-init.js"></script>
</body>
</html>
