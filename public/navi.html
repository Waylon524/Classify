<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e 导航 · Ecolony</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --search-bg: rgba(10, 20, 42, 0.9);
            --search-border: rgba(0, 229, 160, 0.15);
            --search-shadow: rgba(0, 0, 0, 0.3);
        }
        
        .hero {
            text-align: center;
            padding: 80px 24px 40px;
            min-height: 40vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .hero-title {
            font-size: 42px;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        
        .hero-title span { color: var(--accent); }
        
        .hero-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .search-icon {
            display: flex;
            align-items: center;
            padding-right: 12px;
            font-size: 20px;
            opacity: 0.5;
        }
        
        .search-container {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            z-index: 100;
        }
        
        .search-form {
            display: flex;
            background: var(--search-bg);
            border: 1px solid var(--search-border);
            border-radius: 24px;
            padding: 6px 6px 6px 20px;
            box-shadow: 0 8px 32px var(--search-shadow);
            transition: all 0.3s;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
        }
        
        .search-form:focus-within {
            border-color: rgba(0, 229, 160, 0.4);
            box-shadow: 0 8px 32px rgba(0, 229, 160, 0.15);
        }
        
        /* 下拉菜单样式 */
        .engine-dropdown {
            position: relative;
            margin-right: 8px;
            margin-top: 3px;
        }
        
        .engine-dropdown-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(0, 229, 160, 0.06);
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            height: 42px;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            box-sizing: border-box;
        }
        
        .engine-dropdown-btn:hover {
            background: rgba(0, 229, 160, 0.12);
        }
        
        .dropdown-arrow {
            font-size: 10px;
            opacity: 0.6;
            transition: transform 0.2s;
        }
        
        .engine-dropdown.open .dropdown-arrow {
            transform: rotate(180deg);
        }
        
        .engine-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 4px;
            background: rgba(10, 20, 42, 0.95);
            border: 1px solid rgba(0, 229, 160, 0.12);
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            z-index: 1100;
            min-width: 120px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .engine-dropdown.open .engine-dropdown-menu {
            display: block;
        }
        
        .engine-option {
            display: block;
            width: 100%;
            padding: 10px 14px;
            border: none;
            background: none;
            text-align: left;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .engine-option:hover {
            background: rgba(0, 229, 160, 0.06);
            color: var(--text-light);
        }
        
        .engine-option.active {
            background: rgba(0, 229, 160, 0.1);
            color: var(--accent);
            font-weight: 500;
        }
        
        .engine-option[data-engine="bing"].active { color: #ffc107; }
        .engine-option[data-engine="google"].active { color: #4caf50; }
        .engine-option[data-engine="baidu"].active { color: #2196f3; }
        .engine-option[data-engine="douyin"].active { color: #ff6b6b; }
        .engine-option[data-engine="eai"].active { color: #9b59b6; }
        
        .search-engines {
            display: none;
        }
        
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 18px;
            padding: 12px 0;
            background: transparent;
            color: var(--text-light);
        }
        
        .search-input::placeholder { color: var(--text-muted); }
        
        .search-btn {
            background: linear-gradient(135deg, var(--glow-primary), var(--glow-secondary));
            color: var(--bg-abyss);
            border: none;
            border-radius: 10px;
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .search-btn:hover { box-shadow: 0 4px 16px rgba(0, 229, 160, 0.3); transform: translateY(-1px); }
        
        .content { max-width: 1200px; margin: 0 auto; padding: 24px; }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-left: 4px;
        }
        
        .section-title { font-size: 18px; font-weight: 600; color: var(--text-light); }
        
        .edit-btn {
            background: linear-gradient(135deg, var(--glow-primary), var(--glow-secondary));
            color: var(--bg-abyss);
            border: none;
            border-radius: 10px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .edit-btn:hover { box-shadow: 0 4px 12px rgba(0, 229, 160, 0.3); }
        
        .links-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        
        @media (max-width: 1000px) { .links-grid { grid-template-columns: repeat(3, 1fr); } }
        
        @media (max-width: 768px) {
            .links-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; justify-items: stretch; }
            .hero { padding: 60px 16px 32px; }
            .hero-title { font-size: 32px; }
            .search-form { border-radius: 16px; position: relative; }
            .search-input { font-size: 16px; padding-right: 80px; }
            .search-btn { padding: 10px 20px; position: absolute; right: 6px; top: 50%; transform: translateY(-50%); }
            .link-card { width: 100%; padding: 7px 10px; gap: 8px; height: 52px; justify-content: flex-start; box-sizing: border-box; flex-shrink: 0; }
            .link-icon { font-size: 20px; flex-shrink: 0; }
            .link-info { flex: 1; min-width: 0; overflow: hidden; }
            .link-name { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
            .link-desc { display: none; }
            .link-card.add-card { width: 100%; height: 52px; min-height: 52px; padding: 0; flex-shrink: 0; }
            .link-card.add-card .plus-icon { font-size: 24px; }
        }
        
        .link-card {
            background: var(--bg-card);
            border: 1px solid rgba(0, 229, 160, 0.08);
            border-radius: 14px;
            padding: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        .link-card:hover { background: var(--bg-card-hover); border-color: rgba(0, 229, 160, 0.2); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2); }
        .link-card:active { transform: translateY(0); }
        
        .link-card.add-card {
            background: transparent;
            border: 2px dashed rgba(0, 229, 160, 0.2);
            justify-content: center;
            cursor: pointer;
        }
        
        .link-card.add-card:hover { border-color: var(--accent); background: rgba(0, 229, 160, 0.04); transform: translateY(-2px); }
        .link-card.add-card .plus-icon { font-size: 32px; color: var(--accent); font-weight: 300; }
        
        .link-icon { font-size: 28px; flex-shrink: 0; }
        .link-info { flex: 1; min-width: 0; }
        .link-name { font-size: 15px; font-weight: 600; color: var(--text-light); margin-bottom: 2px; }
        .link-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .loading { text-align: center; padding: 60px 24px; color: var(--text-secondary); }
        .loading::after { content: ''; display: inline-block; width: 20px; height: 20px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 12px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .empty-state { text-align: center; padding: 60px 24px; color: var(--text-secondary); }
        
        /* Edit Modal - Full Screen */
        .edit-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-abyss);
            z-index: 2000;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        
        .edit-modal.show { display: flex; }
        
        .edit-header {
            background: var(--bg-white);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 229, 160, 0.08);
            flex-shrink: 0;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        
        .edit-header h2 { font-size: 18px; font-weight: 600; }
        
        .edit-header-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 10px;
            transition: all 0.2s;
        }
        
        .edit-header-btn.cancel { color: var(--text-secondary); }
        .edit-header-btn.cancel:hover { background: rgba(200, 215, 240, 0.08); }
        
        .edit-header-btn.done {
            background: linear-gradient(135deg, var(--glow-primary), var(--glow-secondary));
            color: var(--bg-abyss);
        }
        
        .edit-header-btn.done:hover { box-shadow: 0 4px 12px rgba(0, 229, 160, 0.3); }
        
        .edit-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        
        .edit-tip {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 16px;
        }
        
        .edit-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        @media (max-width: 768px) {
            .edit-content { padding: 16px; }
        }
        
        .edit-card {
            background: var(--bg-card);
            border: 1px solid rgba(0, 229, 160, 0.08);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: grab;
            transition: all 0.2s;
            gap: 16px;
        }
        
        .edit-card:active { cursor: grabbing; }
        
        .edit-card.drag-over {
            background: rgba(0, 229, 160, 0.1);
            border: 2px dashed var(--accent);
        }
        
        .edit-card .drag-handle {
            font-size: 18px;
            opacity: 0.4;
            cursor: grab;
            flex-shrink: 0;
        }
        
        .edit-card:hover .drag-handle { opacity: 1; }
        
        .edit-card-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .edit-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .edit-action-btn.edit {
            background: rgba(0, 229, 160, 0.1);
            color: var(--accent);
        }
        
        .edit-action-btn.edit:hover {
            background: var(--accent);
            color: var(--bg-abyss);
        }
        
        .edit-action-btn.delete {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
        }
        
        .edit-action-btn.delete:hover {
            background: #ff3b30;
            color: var(--bg-abyss);
        }
        
        .edit-card-info {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .edit-card-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        
        .edit-card-url {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        
        /* Link Form Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(4, 8, 16, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal-overlay.show { opacity: 1; visibility: visible; }
        
        .modal {
            background: rgba(10, 20, 42, 0.95);
            border: 1px solid rgba(0, 229, 160, 0.12);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            transform: scale(0.9);
            transition: transform 0.3s;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .modal-overlay.show .modal { transform: scale(1); }
        
        .modal h3 { font-size: 18px; font-weight: 600; color: var(--text-light); margin-bottom: 20px; text-align: center; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1px solid rgba(0, 229, 160, 0.12); border-radius: 10px; font-size: 15px; transition: border-color 0.2s; background: rgba(8, 16, 36, 0.6); color: var(--text-light); }
        .form-group input:focus { outline: none; border-color: rgba(0, 229, 160, 0.4); box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.08); }
        .form-group input::placeholder { color: var(--text-muted); }
        
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
        .modal-btn.cancel { background: rgba(8, 16, 36, 0.6); color: var(--text-light); border: 1px solid rgba(0, 229, 160, 0.1); }
        .modal-btn.cancel:hover { background: rgba(0, 229, 160, 0.08); }
        .modal-btn.submit { background: linear-gradient(135deg, var(--glow-primary), var(--glow-secondary)); color: var(--bg-abyss); }
        .modal-btn.submit:hover { box-shadow: 0 4px 12px rgba(0, 229, 160, 0.3); }
        .modal-btn.delete { background: #ff3b30; color: white; }
        .modal-btn.delete:hover { background: #d63030; }
        .modal-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .delete-confirm {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 16px;
            font-size: 14px;
        }
        
        .delete-confirm strong { color: var(--text-light); }
    </style>

    <link rel="stylesheet" href="/theme-light.css">
    <script src="/theme.js"></script>
</head>
<body>

    <nav>

    <div class="mobile-menu" id="mobileMenu">
        <a href="/">首页</a>
        <a href="/schedule.html">e 日程</a>
        <a href="/files.html">e 文件</a>
        <a href="/navi.html" class="active">e 导航</a>
        <a href="/notices.html">e 通知</a>
        <a href="/form.html">e 表单</a>
        <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
    
    <main>
        <div class="hero">
            <h1 class="hero-title"><span>e</span> 导航</h1>
            <p class="hero-subtitle">你的浏览器主页，一触即达</p>
            
            <div class="search-container">
                <form class="search-form" id="searchForm" action="https://www.bing.com/search" method="get" target="_blank">
                    <div class="engine-dropdown">
                        <button type="button" class="engine-dropdown-btn" id="engineDropdownBtn" onclick="toggleEngineDropdown()">
                            <span id="currentEngineIcon">●</span><span id="currentEngineName">Bing</span><span class="dropdown-arrow">▼</span>
                        </button>
                        <div class="engine-dropdown-menu" id="engineDropdownMenu">
                            <button type="button" class="engine-option active" data-engine="bing" data-url="https://www.bing.com/search" data-param="q">● Bing</button>
                            <button type="button" class="engine-option" data-engine="google" data-url="https://www.google.com/search" data-param="q">● Google</button>
                            <button type="button" class="engine-option" data-engine="baidu" data-url="https://www.baidu.com/s" data-param="wd">● 百度</button>
                            <button type="button" class="engine-option" data-engine="douyin" data-url="https://so.douyin.com/s" data-param="keyword">● 抖音</button>
                            <button type="button" class="engine-option" data-engine="eai" data-url="" data-param="">● e生菌</button>
                        </div>
                    </div>
                    <input type="text" class="search-input" name="q" id="searchInput" placeholder="输入关键词搜索..." autocomplete="off">
                    <button type="button" class="search-btn" onclick="doSearch()">搜索</button>
                </form>
            </div>
        </div>
        
        <div class="content">
            <div class="section-header">
                <h2 class="section-title">📌 网站导航</h2>
                <button class="edit-btn" onclick="openEditModal()">✏️ 编辑</button>
            </div>
            <div class="links-grid" id="linksGrid">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </main>
    
    <!-- Edit Modal -->
    <div class="edit-modal" id="editModal">
        <div class="edit-header">
            <h2>✏️ 编辑网站</h2>
            <div>
                <button class="edit-header-btn cancel" onclick="closeEditModal()">取消</button>
                <button class="edit-header-btn done" onclick="saveAndCloseEditModal()">✅ 完成</button>
            </div>
        </div>
        <div class="edit-content">
            <div class="edit-tip">💡 拖动卡片可调整顺序，点击按钮编辑或删除</div>
            <div class="edit-grid" id="editGrid">
                <!-- Edit cards will be rendered here -->
            </div>
        </div>
    </div>
    
    <!-- Link Form Modal -->
    <div class="modal-overlay" id="linkModal">
        <div class="modal">
            <h3 id="modalTitle">➕ 添加网站</h3>
            <div class="form-group">
                <label>网站名称 *</label>
                <input type="text" id="linkName" placeholder="例如：复旦大学" maxlength="20">
            </div>
            <div class="form-group">
                <label>网站简介</label>
                <input type="text" id="linkDesc" placeholder="简短描述（可选）" maxlength="50">
            </div>
            <div class="form-group">
                <label>网址 *</label>
                <input type="url" id="linkUrl" placeholder="https://example.com">
            </div>
            <input type="hidden" id="editLinkId">
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeLinkModal()">取消</button>
                <button class="modal-btn submit" id="submitBtn" onclick="submitLink()">添加</button>
            </div>
        </div>
    </div>
    
    <!-- Delete Confirm Modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3>🗑️ 删除网站</h3>
            <div class="delete-confirm">确定要删除 <strong id="deleteLinkName"></strong> 吗？</div>
            <input type="hidden" id="deleteLinkId">
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeDeleteModal()">取消</button>
                <button class="modal-btn delete" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>
    
    <script>
        // Check login status on page load - redirect to login if not authenticated
        const token = localStorage.getItem('ecolony_token');
        if (!token) {
            window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
        }
        
        const API = '/api';
        let authToken = localStorage.getItem('ecolony_token') || null;
        let linksData = [];
        let editLinksData = [];
        let draggedCard = null;
        
        // Search engine switching
        let currentEngine = 'bing';
        let currentEngineName = 'bing';
        let currentParam = 'q';
        
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.getElementById('menuToggle');
            menu.classList.toggle('show');
            toggle.textContent = menu.classList.contains('show') ? '✕' : '☰';
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const toggle = document.getElementById('menuToggle');
            if (menu && menu.classList.contains('show') && !menu.contains(e.target) && e.target !== toggle) {
                menu.classList.remove('show');
                toggle.textContent = '☰';
            }
        });
        
        function setActiveEngine(engineName) {
            const btn = document.querySelector(`.engine-option[data-engine="${engineName}"]`);
            if (btn) {
                document.querySelectorAll('.engine-option').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                if (engineName === 'eai') {
                    currentEngineName = 'eai';
                    currentEngine = '';
                } else {
                    document.getElementById('searchForm').action = btn.dataset.url;
                    const input = document.getElementById('searchInput');
                    input.name = btn.dataset.param;
                    currentEngine = btn.dataset.url;
                    currentEngineName = btn.dataset.engine;
                    currentParam = btn.dataset.param;
                }
                updateEngineDropdownBtn(engineName);
            }
        }
        
        function toggleEngineDropdown() {
            const dropdown = document.querySelector('.engine-dropdown');
            dropdown.classList.toggle('open');
        }
        
        function updateEngineDropdownBtn(engineName) {
            const option = document.querySelector(`.engine-option[data-engine="${engineName}"]`);
            if (option) {
                const icon = option.textContent.split(' ')[0];
                const name = option.textContent.split(' ').slice(1).join(' ');
                document.getElementById('currentEngineIcon').textContent = icon;
                document.getElementById('currentEngineName').textContent = name;
            }
        }
        
        // 点击外部关闭下拉菜单
        document.addEventListener('click', function(e) {
            const dropdown = document.querySelector('.engine-dropdown');
            if (dropdown && !dropdown.contains(e.target)) {
                dropdown.classList.remove('open');
            }
        });
        
        document.querySelectorAll('.engine-option').forEach(btn => {
            btn.addEventListener('click', function() {
                setActiveEngine(this.dataset.engine);
                saveSelectedEngine(this.dataset.engine);
                document.querySelector('.engine-dropdown').classList.remove('open');
            });
        });
        
        function doSearch() {
            const input = document.getElementById('searchInput');
            const keyword = input.value.trim();
            
            if (!keyword) return;
            
            if (currentEngineName === 'eai') {
                // e生菌 AI - 跳转到独立对话页面
                const encodedKeyword = encodeURIComponent(keyword);
                window.location.href = '/aichat.html?q=' + encodedKeyword;
            } else if (currentEngine.includes('douyin')) {
                // Douyin AI search with special parameters
                const url = 'https://so.douyin.com/s?enter_method=switch_tab&pd=ai_search&offset=0&keyword=' + encodeURIComponent(keyword);
                window.open(url, '_blank');
            } else {
                // Normal search form submission
                document.getElementById('searchForm').submit();
            }
        }
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { 
                e.preventDefault(); 
                doSearch();
            }
        });
        
        // Render view links
        function renderLinks() {
            const grid = document.getElementById('linksGrid');
            
            
            let html = '';
            
            if (linksData && linksData.length > 0) {
                html = linksData.map(link => `
                    <a href="${escapeHtml(link.url)}" class="link-card" target="_blank" rel="noopener noreferrer">
                        <div class="link-icon">${escapeHtml(link.icon || '🔗')}</div>
                        <div class="link-info">
                            <div class="link-name">${escapeHtml(truncateTitle(link.name, 12))}</div>
                            ${link.description ? `<div class="link-desc">${escapeHtml(link.description)}</div>` : ''}
                        </div>
                    </a>
                `).join('');
            }
            
            // Always show add button
            html += `<div class="link-card add-card" onclick="openLinkModal()"><span class="plus-icon">+</span></div>`;
            
            grid.innerHTML = html;
        }
        
        // Truncate title: Chinese/full-width = 2 chars, English/half-width = 1 char, max 12 chars
        function truncateTitle(text, maxLen = 12) {
            let count = 0;
            let result = '';
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const code = char.charCodeAt(0);
                const isFullWidth = (code >= 0x4E00 && code <= 0x9FFF) || (code >= 0xFF00 && code <= 0xFFEF);
                const charLen = isFullWidth ? 2 : 1;
                if (count + charLen > maxLen) {
                    // Only add ... if we actually exceeded the limit
                    if (result.length > 0) {
                        return result.slice(0, -1) + '...';
                    }
                    return result;
                }
                count += charLen;
                result += char;
            }
            return result;
        }
        
        // Save selected engine to personal data
        async function saveSelectedEngine(engineName) {
            if (!authToken) return;
            try {
                await fetch(API + '/navi/personal/engine', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + authToken
                    },
                    body: JSON.stringify({ selectedEngine: engineName })
                });
            } catch (e) { /* Ignore */ }
        }
        
        // Load selected engine from personal data
        async function loadSelectedEngine() {
            if (!authToken) return 'bing';
            try {
                const res = await fetch(API + '/navi/personal/engine', {
                    headers: { 'Authorization': 'Bearer ' + authToken }
                });
                if (res.ok) {
                    const data = await res.json();
                    return data.selectedEngine || 'bing';
                }
            } catch (e) { /* Ignore */ }
            return 'bing';
        }
        
        // Load links
        async function loadLinks() {
            const grid = document.getElementById('linksGrid');
            
            try {
                if (authToken) {
                    const res = await fetch(API + '/navi/personal', {
                        headers: { 'Authorization': 'Bearer ' + authToken }
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        linksData = data.links || [];
                        renderLinks();
                        return;
                    }
                    
                    if (res.status === 401) {
                        console.log('Token invalid, using default links');
                    }
                }
                
                const res = await fetch(API + '/navi');
                if (!res.ok) {
                    grid.innerHTML = '<div class="empty-state">加载失败: HTTP ' + res.status + '</div>';
                    return;
                }
                const data = await res.json();
                linksData = data.links || data || [];
                renderLinks();
            } catch (e) {
                grid.innerHTML = '<div class="empty-state">加载失败: ' + (e.message || '网络错误') + '</div>';
                console.error('loadLinks error:', e);
            }
        }
        
        // Edit Modal Functions
        function openEditModal() {
            editLinksData = [...linksData];
            renderEditGrid();
            document.getElementById('editModal').classList.add('show');
        }
        
        function openLinkModal() {
            editLinksData = [...linksData];
            document.getElementById('modalTitle').textContent = '➕ 添加网站';
            document.getElementById('submitBtn').textContent = '添加';
            document.getElementById('editLinkId').value = '';
            document.getElementById('linkName').value = '';
            document.getElementById('linkDesc').value = '';
            document.getElementById('linkUrl').value = '';
            document.getElementById('linkModal').classList.add('show');
            document.getElementById('linkName').focus();
        }
        
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }
        
        function saveAndCloseEditModal() {
            linksData = [...editLinksData];
            saveLinks();
            closeEditModal();
            renderLinks();
        }
        
        function renderEditGrid() {
            const grid = document.getElementById('editGrid');
            
            if (editLinksData.length === 0) {
                grid.innerHTML = '<div class="empty-state">暂无链接</div>';
                return;
            }
            
            grid.innerHTML = editLinksData.map((link, index) => `
                <div class="edit-card" data-index="${index}" draggable="true">
                    <span class="drag-handle">☰</span>
                    <div class="edit-card-info">
                        <span class="edit-card-name">${escapeHtml(link.name)}</span>
                        <span class="edit-card-url">${escapeHtml(link.url)}</span>
                    </div>
                    <div class="edit-card-actions">
                        <button class="edit-action-btn edit" onclick="editLinkInModal('${link.id}')">✏️</button>
                        <button class="edit-action-btn delete" onclick="showDeleteModal('${link.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
            
            setupEditDragEvents();
        }
        
        function setupEditDragEvents() {
            const cards = document.querySelectorAll('.edit-card');
            
            cards.forEach(card => {
                card.addEventListener('dragstart', (e) => {
                    draggedCard = card;
                    card.style.opacity = '0.5';
                    e.dataTransfer.effectAllowed = 'move';
                });
                
                card.addEventListener('dragend', () => {
                    card.style.opacity = '1';
                    draggedCard = null;
                    document.querySelectorAll('.edit-card').forEach(c => c.classList.remove('drag-over'));
                });
                
                card.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (card !== draggedCard) {
                        card.classList.add('drag-over');
                    }
                });
                
                card.addEventListener('dragleave', () => {
                    card.classList.remove('drag-over');
                });
                
                card.addEventListener('drop', (e) => {
                    e.preventDefault();
                    card.classList.remove('drag-over');
                    
                    if (draggedCard && card !== draggedCard) {
                        const fromIndex = parseInt(draggedCard.dataset.index);
                        const toIndex = parseInt(card.dataset.index);
                        
                        const [moved] = editLinksData.splice(fromIndex, 1);
                        editLinksData.splice(toIndex, 0, moved);
                        
                        renderEditGrid();
                    }
                });
            });
        }
        
        // Save links
        async function saveLinks() {
            try {
                await fetch(API + '/navi/personal/save', {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + authToken 
                    },
                    body: JSON.stringify({ links: linksData })
                });
            } catch (e) {
                alert('保存失败');
            }
        }
        
        // Link Modal Functions
        function editLinkInModal(id) {
            const link = editLinksData.find(l => l.id === id);
            if (!link) return;
            
            document.getElementById('modalTitle').textContent = '✏️ 编辑网站';
            document.getElementById('submitBtn').textContent = '保存';
            document.getElementById('editLinkId').value = id;
            document.getElementById('linkName').value = link.name;
            document.getElementById('linkDesc').value = link.description || '';
            document.getElementById('linkUrl').value = link.url;
            
            document.getElementById('linkModal').classList.add('show');
            document.getElementById('linkName').focus();
        }
        
        function closeLinkModal() {
            document.getElementById('linkModal').classList.remove('show');
            document.getElementById('linkName').value = '';
            document.getElementById('linkDesc').value = '';
            document.getElementById('linkUrl').value = '';
            document.getElementById('editLinkId').value = '';
        }
        
        function submitLink() {
            const name = document.getElementById('linkName').value.trim();
            const desc = document.getElementById('linkDesc').value.trim();
            let url = document.getElementById('linkUrl').value.trim();
            const editId = document.getElementById('editLinkId').value;
            
            if (!name || !url) { alert('请填写名称和网址'); return; }
            
            if (!url.match(/^https?:\/\//i)) {
                url = 'https://' + url;
            }
            
            if (editId) {
                // Editing existing link
                const index = editLinksData.findIndex(l => l.id === editId);
                if (index !== -1) {
                    editLinksData[index].name = name;
                    editLinksData[index].description = desc;
                    editLinksData[index].url = url;
                }
            } else {
                // Adding new link - append to the end
                editLinksData.push({
                    id: 'u' + Date.now(),
                    name,
                    description: desc,
                    url,
                    icon: '🔗',
                    isDefault: false
                });
            }
            
            // Update main links data
            linksData = [...editLinksData];
            saveLinks();
            closeLinkModal();
            renderLinks();
        }
        
        // Delete Functions
        function showDeleteModal(id) {
            const link = editLinksData.find(l => l.id === id);
            if (link) {
                document.getElementById('deleteLinkName').textContent = link.name;
                document.getElementById('deleteLinkId').value = id;
                document.getElementById('deleteModal').classList.add('show');
            }
        }
        
        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
        }
        
        function confirmDelete() {
            const id = document.getElementById('deleteLinkId').value;
            editLinksData = editLinksData.filter(l => l.id !== id);
            closeDeleteModal();
            renderEditGrid();
        }
        
        // Close modals events
        document.getElementById('linkModal').addEventListener('click', function(e) { if (e.target === this) closeLinkModal(); });
        document.getElementById('deleteModal').addEventListener('click', function(e) { if (e.target === this) closeDeleteModal(); });
        document.addEventListener('keydown', function(e) { 
            if (e.key === 'Escape') { 
                closeLinkModal(); 
                closeDeleteModal(); 
            }
        });
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Check auth and load
        async function checkAuth() {
            if (!authToken) return;
            try {
                const res = await fetch(API + '/check-device');
                const data = await res.json();
                if (!data.success) { localStorage.removeItem('ecolony_token'); authToken = null; }
            } catch (e) { /* Ignore */ }
        }
        
        document.addEventListener('DOMContentLoaded', async function() {
            await checkAuth();
            loadLinks();
            // Load saved search engine
            const savedEngine = await loadSelectedEngine();
            setActiveEngine(savedEngine);
        });
        function logout() {
            localStorage.removeItem('ecolony_token');
            window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
        }

    </script>
<script src="/auth-check.js"></script>
<script src="/config.js"></script>
<script src="/config-init.js"></script>
